version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      next:
        patterns: ["next", "@next/*", "eslint-config-next"]
      ai:
        patterns: ["ai", "@ai-sdk/*"]
      supabase:
        patterns: ["@supabase/*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
